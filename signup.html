<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register — Clay Notes</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

  <div class="blob blob1"></div>
  <div class="blob blob2"></div>
  <div class="blob blob3"></div>
  <div class="blob blob4"></div>

  <div class="auth-screen">
    <div class="card">
      <div class="logo-row">
        <div class="logo-blob"><span>C</span></div>
      </div>
      <h1>Create your account</h1>
      <p class="subtitle">Your own space — just for you</p>

      <form id="signupForm">
        <div class="field">
          <label for="signupName">Name</label>
          <div class="input-wrap">
            <input type="text" id="signupName" placeholder="Your name" required autocomplete="name">
          </div>
        </div>
        <div class="field">
          <label for="signupEmail">Email</label>
          <div class="input-wrap">
            <input type="email" id="signupEmail" placeholder="you@example.com" required autocomplete="email">
          </div>
        </div>
        <div class="field">
          <label for="signupPassword">Password</label>
          <div class="input-wrap">
            <input type="password" id="signupPassword" placeholder="At least 6 characters" required autocomplete="new-password">
            <button type="button" class="toggle-eye" data-target="signupPassword" aria-label="Show password">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
            </button>
          </div>
        </div>
        <div class="field">
          <label for="signupConfirm">Confirm password</label>
          <div class="input-wrap">
            <input type="password" id="signupConfirm" placeholder="Type it again" required autocomplete="new-password">
            <button type="button" class="toggle-eye" data-target="signupConfirm" aria-label="Show password">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
            </button>
          </div>
          <p class="hint" id="matchHint"></p>
        </div>
        <button type="submit" class="btn btn-primary">Register</button>
      </form>

      <p class="foot-link">Already have an account? <a href="index.html">Log in</a></p>
    </div>
  </div>

  <div class="toast" id="toast"><span class="dot"></span><span id="toastText"></span></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabaseClient.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
