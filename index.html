<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Log in — Clay Notes</title>
<link rel="stylesheet" href="css/style.css">

</head>
<body>

  <div class="blob blob1"></div>
  <div class="blob blob2"></div>
  <div class="blob blob3"></div>
  <div class="blob blob4"></div>

  <div class="auth-screen">
    <div class="card">
      <div class="logo-row">
        <div class="logo-blob"><span>C</span></div>
      </div>
      <h1>Welcome back</h1>
      <p class="subtitle">Log in to pick up where you left off</p>

      <form id="loginForm">
        <div class="field">
          <label for="loginEmail">Email</label>
          <div class="input-wrap">
            <input type="email" id="loginEmail" placeholder="you@example.com" required autocomplete="email">
          </div>
        </div>
        <div class="field">
          <label for="loginPassword">Password</label>
          <div class="input-wrap">
            <input type="password" id="loginPassword" placeholder="Enter your password" required autocomplete="current-password">
            <button type="button" class="toggle-eye" data-target="loginPassword" aria-label="Show password">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
            </button>
          </div>
        </div>
        <button type="submit" class="btn btn-primary">Log in</button>
      </form>

      <p class="foot-link">Don't have an account? <a href="signup.html">Register</a></p>
    </div>
  </div>

  <div class="toast" id="toast"><span class="dot"></span><span id="toastText"></span></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabaseClient.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
