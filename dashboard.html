<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard — Clay Notes</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

  <div class="blob blob1"></div>
  <div class="blob blob2"></div>
  <div class="blob blob3"></div>
  <div class="blob blob4"></div>

  <div class="app-shell">
    <nav class="navbar">
      <div class="brand">
        <div class="logo-blob"><span>C</span></div>
        <span class="brand-name">Clay Notes</span>
      </div>
      <div class="user-pill">
        <span class="user-email" id="userEmail">loading…</span>
        <button class="btn btn-secondary btn-small" id="logoutBtn">Log out</button>
      </div>
    </nav>

    <main class="main">
      <div class="main-head">
        <div>
          <h1>Your notes</h1>
          <p class="subtitle">Only you can see what's here</p>
        </div>
        <button class="btn btn-primary" id="newNoteBtn">+ New note</button>
      </div>

      <div class="spinner" id="spinner"></div>

      <div class="notes-grid" id="notesGrid" style="display:none;"></div>

      <div class="empty-state" id="emptyState" style="display:none;">
        <div class="logo-blob"><span>C</span></div>
        <h2>No notes yet</h2>
        <p>Create your first note to get started.</p>
        <button class="btn btn-primary" id="emptyNewNoteBtn">+ New note</button>
      </div>
    </main>
  </div>

  <!-- add / edit note modal -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal-card">
      <h2 id="modalTitle">New note</h2>
      <form id="noteForm">
        <div class="field">
          <label for="noteTitleInput">Title</label>
          <div class="input-wrap">
            <input type="text" id="noteTitleInput" placeholder="Note title" required>
          </div>
        </div>
        <div class="field">
          <label for="noteContentInput">Content</label>
          <div class="input-wrap">
            <textarea id="noteContentInput" placeholder="Write something…"></textarea>
          </div>
        </div>
        <div class="modal-actions">
          <button type="button" class="btn btn-secondary" id="cancelModalBtn">Cancel</button>
          <button type="submit" class="btn btn-primary">Save note</button>
        </div>
      </form>
    </div>
  </div>

  <div class="toast" id="toast"><span class="dot"></span><span id="toastText"></span></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabaseClient.js"></script>
  <script src="js/dashboard.js"></script>
</body>
</html>
