<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard — Clay Tasks</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

  <div class="blob blob1"></div>
  <div class="blob blob2"></div>
  <div class="blob blob3"></div>
  <div class="blob blob4"></div>

  <div class="app-shell">
    <nav class="navbar">
      <div class="brand">
        <div class="logo-blob"><span>C</span></div>
        <span class="brand-name">Clay Tasks</span>
      </div>
      <div class="user-pill">
        <span class="user-email" id="userEmail">loading…</span>
        <button class="btn btn-secondary btn-small" id="logoutBtn">Log out</button>
      </div>
    </nav>

    <main class="main">
  <div class="main-head">
    <div>
      <h1>Your tasks</h1>
      <p class="subtitle">Stay on top of what matters</p>
    </div>
    <button class="btn btn-primary" id="newTaskBtn">+ New task</button>
  </div>

  <div class="spinner" id="spinner"></div>

  <!-- Incomplete tasks - always visible -->
  <div id="incompleteSection">
    <h2 style="font-family:'Baloo 2',sans-serif; margin: 20px 0 12px;">📋 To do</h2>
    <div class="notes-grid" id="incompleteGrid"></div>
  </div>

  <!-- Completed tasks - always visible -->
  <div id="completedSection">
    <h2 style="font-family:'Baloo 2',sans-serif; margin: 20px 0 12px;">✅ Completed</h2>
    <div class="notes-grid" id="completedGrid"></div>
  </div>
</main>
  </div>

  <!-- add / edit task modal -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal-card">
      <h2 id="modalTitle">New task</h2>
      <form id="taskForm">
        <div class="field">
          <label for="taskTitleInput">Title</label>
          <div class="input-wrap">
            <input type="text" id="taskTitleInput" placeholder="Task title" required>
          </div>
        </div>
        <div class="field">
          <label for="taskContentInput">Description</label>
          <div class="input-wrap">
            <textarea id="taskContentInput" placeholder="Add details…"></textarea>
          </div>
        </div>
        <div class="field">
          <label for="taskDueInput">Due date</label>
          <div class="input-wrap">
            <input type="datetime-local" id="taskDueInput">
          </div>
        </div>
        <div class="modal-actions">
          <button type="button" class="btn btn-secondary" id="cancelModalBtn">Cancel</button>
          <button type="submit" class="btn btn-primary">Save task</button>
        </div>
      </form>
    </div>
  </div>

  <div class="toast" id="toast"><span class="dot"></span><span id="toastText"></span></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabaseClient.js"></script>
  <script src="js/dashboard.js"></script>
</body>
</html>
